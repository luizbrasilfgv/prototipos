<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparador de Casas — Viagem QBEE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --card: #ffffff;
      --border: #ddd9d0;
      --text: #1a1a1a;
      --muted: #6b6560;
      --accent: #2d6a4f;
      --accent-light: #e8f5ee;
      --warn: #c0392b;
      --warn-light: #fdf0ef;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 28px;
    }
    header h1 {
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      text-transform: uppercase;
    }
    header p {
      margin-top: 8px;
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 500px;
      margin-inline: auto;
      line-height: 1.5;
    }

    /* ── BUDGET GLOBAL ── */
    .budget-wrap {
      max-width: 360px;
      margin: 0 auto 32px;
      background: var(--card);
      border: 2px solid #f0c040;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      text-align: center;
    }
    .budget-wrap .budget-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #7d5a00;
      margin-bottom: 8px;
    }
    .budget-wrap .budget-desc {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .budget-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }
    .budget-prefix {
      font-size: 1rem;
      font-weight: 700;
      color: #7d5a00;
      flex-shrink: 0;
    }
    .budget-wrap input {
      width: 160px;
      padding: 10px 12px;
      border: 1.5px solid #e8cc6a;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      background: #fffbea;
      text-align: center;
      -webkit-appearance: none;
    }
    .budget-wrap input:focus {
      outline: none;
      border-color: #d4a010;
      background: #fff;
    }
    .budget-hint {
      margin-top: 10px;
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .budget-hint span { display: inline-block; margin: 1px 4px; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s;
    }
    .card-header {
      text-align: center;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .card-header h2 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── FIELDS ── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 5px;
    }
    .field input[type="text"],
    .field input[type="number"],
    .field input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      background: #fafaf8;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }

    /* ── VALOR POR PESSOA ── */
    .vpp-box {
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 18px;
      text-align: center;
      border: 1.5px solid var(--border);
      background: #fafaf8;
      transition: background 0.3s, border-color 0.3s;
    }
    .vpp-box.below   { background: #e8f5ee; border-color: #74c79a; }
    .vpp-box.at      { background: #e8f5ee; border-color: #74c79a; }
    .vpp-box.over20  { background: #fff8e1; border-color: #f0c040; }
    .vpp-box.toohigh { background: var(--warn-light); border-color: #e8a09b; }

    .vpp-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .vpp-value {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text);
    }
    .vpp-value.empty {
      font-size: 0.88rem;
      font-weight: 400;
      color: #9ca3a0;
    }
    .vpp-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .badge-below   { background: var(--accent); color: #fff; }
    .badge-at      { background: #3a8a62; color: #fff; }
    .badge-over20  { background: #e6a817; color: #fff; }
    .badge-toohigh { background: var(--warn); color: #fff; }

    /* ── SECTION TITLES ── */
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 7px 10px;
      border-radius: 6px;
      margin: 16px 0 10px;
    }
    .section-obrigatorio {
      background: #fff3cd;
      color: #7d5a00;
      border-left: 3px solid #f0ad4e;
    }
    .section-bom {
      background: #e8f5ee;
      color: #1e5c38;
      border-left: 3px solid var(--accent);
    }
    .section-pode {
      background: #e8f0ff;
      color: #2c4aad;
      border-left: 3px solid #4b6bdf;
    }
    .section-nao {
      background: var(--warn-light);
      color: var(--warn);
      border-left: 3px solid var(--warn);
    }

    /* ── CHECKBOXES ── */
    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
      cursor: pointer;
      border-bottom: 1px solid #f0ece5;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item input[type="checkbox"] {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: var(--accent);
      margin-top: 1px;
    }
    .section-nao-checks .check-item input[type="checkbox"] {
      accent-color: var(--warn);
    }
    .check-item span {
      font-size: 0.88rem;
      line-height: 1.4;
      color: var(--text);
    }

    /* ── RESULT BANNER ── */
    .result-banner {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
    }
    .result-banner.valid {
      background: var(--accent-light);
      border: 2px solid #74c79a;
    }
    .result-banner.discarded {
      background: var(--warn-light);
      border: 2px solid #e8a09b;
    }
    .result-banner .result-icon {
      font-size: 1.6rem;
      display: block;
      margin-bottom: 4px;
    }
    .result-banner .result-status {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .result-banner.valid .result-status  { color: var(--accent); }
    .result-banner.discarded .result-status { color: var(--warn); }
    .result-banner .result-score {
      font-size: 1.4rem;
      font-weight: 800;
      margin-top: 6px;
      color: var(--accent);
    }
    .result-banner .result-breakdown {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.7;
      text-align: left;
      background: rgba(255,255,255,0.6);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .result-banner .result-reason {
      font-size: 0.78rem;
      color: var(--warn);
      margin-top: 6px;
      line-height: 1.5;
    }

    /* ── BUTTON ── */
    .btn-wrap {
      text-align: center;
      margin: 32px auto 0;
      max-width: 1100px;
    }
    .btn-avaliar {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px 48px;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(45,106,79,0.3);
      transition: background 0.2s, transform 0.1s;
    }
    .btn-avaliar:hover  { background: #235c40; }
    .btn-avaliar:active { transform: scale(0.98); }

    /* ── RANKING ── */
    #ranking {
      display: none;
      max-width: 600px;
      margin: 36px auto 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    #ranking .rank-header {
      background: var(--accent);
      color: #fff;
      padding: 16px 20px;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }
    #ranking .rank-list {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .rank-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
    }
    .rank-item.first         { background: #fffbea; border-color: #f0c040; }
    .rank-item.second        { background: #f7f8fa; border-color: #c0c8d5; }
    .rank-item.third         { background: #fdf5f0; border-color: #d9a87a; }
    .rank-item.discarded-row { background: var(--warn-light); border-color: #e8a09b; opacity: 0.85; }

    .rank-medal { font-size: 1.5rem; flex-shrink: 0; }
    .rank-info  { flex: 1; min-width: 0; }
    .rank-name  {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-detail { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .rank-score  { font-size: 1.1rem; font-weight: 800; color: var(--accent); flex-shrink: 0; }
    .rank-item.discarded-row .rank-score { color: var(--warn); }

    /* ── LINK ── */
    .link-preview { display: none; font-size: 0.78rem; margin-top: 4px; word-break: break-all; }
    .link-preview a { color: var(--accent); text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>Comparador de Casas — Viagem QBEE</h1>
  <p>Use os critérios abaixo para avaliar as casas encontradas.</p>
</header>

<!-- BUDGET GLOBAL -->
<div class="budget-wrap">
  <div class="budget-label">💰 Budget por pessoa</div>
  <div class="budget-desc">Defina o teto de gasto por pessoa para pontuar o preço de cada casa.</div>
  <div class="budget-input-row">
    <span class="budget-prefix">R$</span>
    <input type="number" id="budgetInput" placeholder="Ex.: 1200" min="0" oninput="onBudgetChange()" />
  </div>
  <div class="budget-hint">
    <span>✅ Abaixo: +3 pts</span>
    <span>✅ No limite: +2 pts</span>
    <span>🟡 Até 20% acima: 0 pts</span>
    <span>❌ Muito acima: −3 pts</span>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="btn-wrap">
  <button class="btn-avaliar" onclick="avaliar()">Avaliar Casas</button>
</div>

<div id="ranking">
  <div class="rank-header">🏆 Ranking das Casas</div>
  <div class="rank-list" id="rankList"></div>
</div>

<script>
  // ── DATA ─────────────────────────────────────────────────────────────────
  const CRITERIA = {
    obrigatorio: [
      { id: 'ob1', label: '13 suítes (mínimo)' },
      { id: 'ob2', label: 'Ar-condicionado em todos os quartos' },
      { id: 'ob3', label: 'Banheiro em todos os quartos' },
    ],
    bom: [
      { id: 'bom1', label: 'Espaço reservado/fechado apenas para o grupo' },
      { id: 'bom2', label: 'Área externa confortável' },
      { id: 'bom3', label: 'Serviços de cozinha ou limpeza' },
    ],
    pode: [
      { id: 'pode1', label: 'Piscina ou sauna' },
      { id: 'pode2', label: 'Campos ou quadras de esportes' },
      { id: 'pode3', label: 'Algum diferencial da casa' },
    ],
    nao: [
      { id: 'nao1', label: 'Ticket médio muito acima do budget' },
      { id: 'nao2', label: 'Casa com poucos quartos usando colchão extra' },
      { id: 'nao3', label: 'Casa sem ar-condicionado' },
    ],
  };

  // ── BUILD CARDS ───────────────────────────────────────────────────────────
  function buildCard(n) {
    const id = `c${n}`;
    const checksObrig = CRITERIA.obrigatorio.map(c => checkItem(id, c.id, c.label, false)).join('');
    const checksBom   = CRITERIA.bom.map(c => checkItem(id, c.id, c.label, false)).join('');
    const checksPode  = CRITERIA.pode.map(c => checkItem(id, c.id, c.label, false)).join('');
    const checksNao   = CRITERIA.nao.map(c => checkItem(id, c.id, c.label, true)).join('');

    return `
      <div class="card" id="${id}">
        <div class="card-header"><h2>Casa ${n}</h2></div>

        <div class="field">
          <label>Nome da casa</label>
          <input type="text" id="${id}_nome" placeholder="Ex.: Casa da Serra" />
        </div>

        <div class="field">
          <label>Link da casa</label>
          <input type="url" id="${id}_link" placeholder="https://..." oninput="updateLink('${id}')" />
          <div class="link-preview" id="${id}_linkPreview">
            <a id="${id}_linkAnchor" href="#" target="_blank" rel="noopener">Abrir link ↗</a>
          </div>
        </div>

        <div class="field">
          <label>Valor total da casa (R$)</label>
          <input type="number" id="${id}_valor" placeholder="Ex.: 22000" min="0" oninput="calcVpp('${id}')" />
        </div>

        <div class="field">
          <label>Número de pessoas</label>
          <input type="number" id="${id}_pessoas" placeholder="Ex.: 20" min="1" oninput="calcVpp('${id}')" />
        </div>

        <div class="field">
          <label>Número de suítes</label>
          <input type="number" id="${id}_suites" placeholder="Ex.: 13" min="0" />
        </div>

        <div class="vpp-box" id="${id}_vppBox">
          <div class="vpp-label">Valor por pessoa</div>
          <div class="vpp-value empty" id="${id}_vpp">Preencha valor e pessoas</div>
          <div id="${id}_vppBadge"></div>
        </div>

        <div class="section-title section-obrigatorio">⚠️ Tem que ter (obrigatório)</div>
        ${checksObrig}

        <div class="section-title section-bom">✅ Seria bom ter <em style="font-style:normal;font-size:0.68rem">(+2 pts cada)</em></div>
        ${checksBom}

        <div class="section-title section-pode">💡 Pode ter <em style="font-style:normal;font-size:0.68rem">(+1 pt cada)</em></div>
        ${checksPode}

        <div class="section-title section-nao">🚫 Não vamos buscar</div>
        <div class="section-nao-checks">${checksNao}</div>

        <div class="result-banner" id="${id}_result">
          <span class="result-icon"   id="${id}_resultIcon"></span>
          <div class="result-status"  id="${id}_resultStatus"></div>
          <div class="result-score"   id="${id}_resultScore"></div>
          <div class="result-breakdown" id="${id}_resultBreakdown" style="display:none"></div>
          <div class="result-reason"  id="${id}_resultReason"></div>
        </div>
      </div>`;
  }

  function checkItem(cardId, cId, label, isNao) {
    return `
      <label class="check-item">
        <input type="checkbox" id="${cardId}_${cId}"${isNao ? ' style="accent-color:var(--warn)"' : ''} />
        <span>${label}</span>
      </label>`;
  }

  document.getElementById('grid').innerHTML = [1, 2, 3].map(buildCard).join('');

  // ── BUDGET ────────────────────────────────────────────────────────────────
  function getBudget() {
    return parseFloat(document.getElementById('budgetInput').value) || 0;
  }

  function onBudgetChange() {
    ['c1', 'c2', 'c3'].forEach(id => calcVpp(id));
  }

  // ── PRICE TIER ────────────────────────────────────────────────────────────
  // Returns { tier: 'below'|'at'|'over20'|'toohigh', pts, label, badgeClass }
  function priceTier(vpp, budget) {
    if (!budget || !vpp) return null;
    if (vpp < budget)           return { tier: 'below',   pts:  3, label: '✅ Abaixo do budget (+3 pts)',       badgeClass: 'badge-below'   };
    if (vpp === budget)         return { tier: 'at',      pts:  2, label: '✅ Dentro do budget (+2 pts)',       badgeClass: 'badge-at'      };
    if (vpp <= budget * 1.2)   return { tier: 'over20',  pts:  0, label: '🟡 Até 20% acima do budget (0 pts)', badgeClass: 'badge-over20'  };
    return                             { tier: 'toohigh', pts: -3, label: '❌ Muito acima do budget (−3 pts)',  badgeClass: 'badge-toohigh' };
  }

  // ── VALOR POR PESSOA ──────────────────────────────────────────────────────
  function calcVpp(id) {
    const valor   = parseFloat(document.getElementById(`${id}_valor`)?.value)   || 0;
    const pessoas = parseFloat(document.getElementById(`${id}_pessoas`)?.value) || 0;
    const el      = document.getElementById(`${id}_vpp`);
    const badgeEl = document.getElementById(`${id}_vppBadge`);
    const boxEl   = document.getElementById(`${id}_vppBox`);

    // Reset
    boxEl.className = 'vpp-box';
    badgeEl.innerHTML = '';

    if (valor > 0 && pessoas > 0) {
      const vpp = valor / pessoas;
      el.textContent = `R$ ${vpp.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 })} por pessoa`;
      el.classList.remove('empty');

      const budget = getBudget();
      const tier   = priceTier(vpp, budget);
      if (tier) {
        boxEl.classList.add(tier.tier);
        badgeEl.innerHTML = `<span class="vpp-badge ${tier.badgeClass}">${tier.label}</span>`;
      }
    } else {
      el.textContent = 'Preencha valor e pessoas';
      el.classList.add('empty');
    }
  }

  // ── LINK PREVIEW ──────────────────────────────────────────────────────────
  function updateLink(id) {
    const val     = document.getElementById(`${id}_link`)?.value?.trim();
    const preview = document.getElementById(`${id}_linkPreview`);
    const anchor  = document.getElementById(`${id}_linkAnchor`);
    if (val && (val.startsWith('http://') || val.startsWith('https://'))) {
      anchor.href = val;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  }

  // ── HELPERS ───────────────────────────────────────────────────────────────
  function isChecked(id) {
    return document.getElementById(id)?.checked ?? false;
  }
  function fmt(n) {
    return `R$ ${n.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}`;
  }
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── AVALIAR ───────────────────────────────────────────────────────────────
  function avaliar() {
    const cards   = ['c1', 'c2', 'c3'];
    const budget  = getBudget();
    const results = [];

    cards.forEach(id => {
      const banner       = document.getElementById(`${id}_result`);
      const iconEl       = document.getElementById(`${id}_resultIcon`);
      const statusEl     = document.getElementById(`${id}_resultStatus`);
      const scoreEl      = document.getElementById(`${id}_resultScore`);
      const breakdownEl  = document.getElementById(`${id}_resultBreakdown`);
      const reasonEl     = document.getElementById(`${id}_resultReason`);
      const nome         = document.getElementById(`${id}_nome`)?.value?.trim() || `Casa ${id.slice(1)}`;
      const suites       = parseInt(document.getElementById(`${id}_suites`)?.value) || 0;
      const valor        = parseFloat(document.getElementById(`${id}_valor`)?.value)   || 0;
      const pessoas      = parseFloat(document.getElementById(`${id}_pessoas`)?.value) || 0;
      const vpp          = (valor > 0 && pessoas > 0) ? valor / pessoas : 0;

      // Reset
      banner.style.display  = 'block';
      banner.className      = 'result-banner';
      reasonEl.textContent  = '';
      breakdownEl.style.display = 'none';
      breakdownEl.innerHTML = '';

      // ── ETAPA 1: Validação obrigatória ────────────────────────────────────
      const missingObrig = CRITERIA.obrigatorio.filter(c => !isChecked(`${id}_${c.id}`));
      const markedNao    = CRITERIA.nao.filter(c => isChecked(`${id}_${c.id}`));

      if (missingObrig.length > 0 || markedNao.length > 0) {
        banner.classList.add('discarded');
        iconEl.textContent   = '❌';
        statusEl.textContent = 'Casa descartada';
        scoreEl.textContent  = '';
        const reasons = [];
        if (missingObrig.length) reasons.push(`Falta: ${missingObrig.map(c => c.label).join('; ')}`);
        if (markedNao.length)    reasons.push(`Problema: ${markedNao.map(c => c.label).join('; ')}`);
        reasonEl.textContent = reasons.join(' | ');
        results.push({ nome, score: null, discarded: true });
        return;
      }

      // ── ETAPA 2: Pontuação ────────────────────────────────────────────────
      const lines = [];
      let score   = 0;

      // Preço
      const tier = priceTier(vpp, budget);
      if (tier) {
        score += tier.pts;
        const sign = tier.pts > 0 ? `+${tier.pts}` : `${tier.pts}`;
        lines.push(`💰 Preço por pessoa: ${fmt(vpp)} → ${sign} pts (${tier.tier === 'below' ? 'abaixo' : tier.tier === 'at' ? 'no limite' : tier.tier === 'over20' ? 'até 20% acima' : 'muito acima'})`);
      } else if (budget === 0) {
        lines.push('💰 Preço: budget não informado (não pontuado)');
      }

      // Seria bom ter (+2 cada)
      let bomScore = 0;
      CRITERIA.bom.forEach(c => {
        if (isChecked(`${id}_${c.id}`)) { score += 2; bomScore += 2; }
      });
      if (bomScore > 0) lines.push(`✅ Seria bom ter: +${bomScore} pts`);

      // Pode ter (+1 cada)
      let podeScore = 0;
      CRITERIA.pode.forEach(c => {
        if (isChecked(`${id}_${c.id}`)) { score += 1; podeScore += 1; }
      });
      if (podeScore > 0) lines.push(`💡 Pode ter: +${podeScore} pts`);

      // Bônus suítes
      let suiteBonus = 0;
      if      (suites >= 16) suiteBonus = 3;
      else if (suites >= 15) suiteBonus = 2;
      else if (suites >= 14) suiteBonus = 1;
      if (suiteBonus > 0) {
        score += suiteBonus;
        lines.push(`🏠 Bônus suítes (${suites}): +${suiteBonus} pts`);
      }

      // Resultado
      banner.classList.add('valid');
      iconEl.textContent   = '✅';
      statusEl.textContent = 'Casa válida';
      scoreEl.textContent  = `${score} ponto${score !== 1 ? 's' : ''}`;

      if (lines.length) {
        breakdownEl.innerHTML     = lines.map(l => `<div>${l}</div>`).join('');
        breakdownEl.style.display = 'block';
      }

      results.push({ nome, score, discarded: false });
    });

    renderRanking(results);
  }

  // ── RANKING ───────────────────────────────────────────────────────────────
  function renderRanking(results) {
    const rankEl  = document.getElementById('ranking');
    const listEl  = document.getElementById('rankList');
    const valids  = results.filter(r => !r.discarded).sort((a, b) => b.score - a.score);
    const dropped = results.filter(r => r.discarded);

    const medals   = ['🏆', '🥈', '🥉'];
    const rowClass = ['first', 'second', 'third'];

    let html = '';

    valids.forEach((r, i) => {
      html += `
        <div class="rank-item ${rowClass[i] || ''}">
          <span class="rank-medal">${medals[i] || '🏠'}</span>
          <div class="rank-info">
            <div class="rank-name">${escHtml(r.nome)}</div>
            <div class="rank-detail">${i + 1}º lugar</div>
          </div>
          <div class="rank-score">${r.score} pt${r.score !== 1 ? 's' : ''}</div>
        </div>`;
    });

    dropped.forEach(r => {
      html += `
        <div class="rank-item discarded-row">
          <span class="rank-medal">❌</span>
          <div class="rank-info">
            <div class="rank-name">${escHtml(r.nome)}</div>
            <div class="rank-detail">Descartada</div>
          </div>
          <div class="rank-score">—</div>
        </div>`;
    });

    listEl.innerHTML = html;
    rankEl.style.display = 'block';
    rankEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
